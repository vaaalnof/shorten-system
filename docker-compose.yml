version: "3.9"

services:

  postgres:
    image: postgres:15-alpine
    container_name: shorten-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: shorten_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - shorten-network

  redis:
    image: redis:7-alpine
    container_name: shorten-redis
    restart: always
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - shorten-network

  nats:
    image: nats:2.10-alpine
    container_name: shorten-nats
    restart: always
    command:
      - "--js"
      - "--http_port=8222"
      - "--store_dir=/data"
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats_data:/data
    networks:
      - shorten-network

volumes:
  postgres_data:
  redis_data:
  nats_data:

networks:
  shorten-network:
    driver: bridge